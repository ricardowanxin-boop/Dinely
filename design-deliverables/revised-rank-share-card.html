<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DineRank Rank Share Card</title>
    <style>
      :root {
        --navy: #2c3e50;
        --navy-2: #435971;
        --violet: #7c3aed;
        --gold: #ffd700;
        --gold-soft: #fff0a8;
        --white: #ffffff;
        --muted: rgba(255, 255, 255, 0.82);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef2f6;
        font-family:
          "SF Pro Display",
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .poster {
        position: relative;
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        border-radius: 40px;
        background:
          radial-gradient(circle at 78% 16%, rgba(255, 215, 0, 0.18), transparent 22%),
          radial-gradient(circle at 24% 82%, rgba(168, 85, 247, 0.2), transparent 24%),
          linear-gradient(145deg, var(--navy) 12%, var(--navy-2) 56%, var(--violet) 100%);
        color: var(--white);
        box-shadow: 0 28px 80px rgba(26, 26, 26, 0.26);
      }

      .topbar {
        position: absolute;
        left: 64px;
        top: 56px;
        width: 952px;
        height: 96px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        padding: 26px 32px;
      }

      .eyebrow {
        font-size: 14px;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 8px;
      }

      .title {
        font-size: 28px;
        font-weight: 700;
      }

      .badge-wrap {
        position: absolute;
        inset: 206px auto auto 390px;
        width: 300px;
        height: 300px;
        border-radius: 999px;
        border: 14px solid rgba(255, 215, 0, 0.95);
        box-shadow: 0 0 32px rgba(255, 215, 0, 0.28);
      }

      .badge-core {
        position: absolute;
        inset: 32px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .rank-badge {
        position: absolute;
        inset: 66px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, var(--gold) 0%, var(--gold-soft) 100%);
        color: #151515;
        font-size: 74px;
        box-shadow: 0 0 28px rgba(255, 215, 0, 0.34);
      }

      .rank-copy {
        position: absolute;
        top: 516px;
        left: 0;
        width: 100%;
        text-align: center;
      }

      .rank-copy h1 {
        margin: 0;
        font-size: 34px;
        font-weight: 700;
      }

      .rank-copy h2 {
        margin: 18px 0 0;
        font-size: 44px;
        font-weight: 700;
        color: var(--gold);
      }

      .rank-copy p {
        margin: 18px auto 0;
        width: 420px;
        line-height: 1.6;
        font-size: 18px;
        color: var(--muted);
      }

      .stats {
        position: absolute;
        top: 706px;
        left: 148px;
        display: flex;
        gap: 32px;
      }

      .stat {
        width: 240px;
        height: 208px;
        border-radius: 24px;
        background: var(--white);
        color: var(--navy);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: 0 18px 42px rgba(10, 22, 35, 0.16);
      }

      .stat-value {
        font-size: 46px;
        font-weight: 700;
        line-height: 1;
      }

      .stat-label {
        margin-top: 18px;
        font-size: 16px;
        font-weight: 600;
        color: #64748b;
      }

      .quote {
        position: absolute;
        left: 148px;
        top: 968px;
        width: 784px;
        height: 132px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 64px;
      }

      .quote strong {
        font-size: 36px;
        line-height: 1.2;
      }

      .quote span {
        margin-top: 10px;
        font-size: 16px;
        color: var(--muted);
      }

      .footer {
        position: absolute;
        left: 148px;
        top: 1136px;
        display: flex;
        gap: 96px;
        align-items: stretch;
      }

      .qr-card,
      .brand-card {
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.14);
      }

      .qr-card {
        width: 310px;
        padding: 28px;
        display: flex;
        gap: 18px;
        align-items: center;
      }

      .qr {
        width: 94px;
        height: 94px;
        border-radius: 18px;
        border: 1px solid #d0d7e1;
        background:
          linear-gradient(90deg, #c7d0db 12px, transparent 12px) 0 0 / 24px 24px,
          linear-gradient(#c7d0db 12px, transparent 12px) 0 0 / 24px 24px,
          #f8fafc;
      }

      .qr-card h3,
      .brand-card h3 {
        margin: 0;
      }

      .qr-card p,
      .brand-card p {
        margin: 10px 0 0;
        line-height: 1.45;
        color: var(--muted);
      }

      .brand-card {
        width: 376px;
        padding: 28px 34px;
      }

      .brand-card h3 {
        font-size: 36px;
      }

      .hash {
        margin-top: 14px;
        color: var(--gold);
        font-weight: 700;
      }
    </style>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <main class="poster">
      <div class="topbar">
        <div class="eyebrow">DineRank / Share Card</div>
        <div class="title">把守约率和段位变成可以分享的社交素材</div>
      </div>

      <div class="badge-wrap">
        <div class="badge-core"></div>
        <div class="rank-badge">👑</div>
      </div>

      <section class="rank-copy">
        <h1>传奇守约者</h1>
        <h2>98% 守约率</h2>
        <p>在 DineRank 中保持了超高守约率，这份战绩值得发到群里炫耀一下。</p>
      </section>

      <section class="stats">
        <div class="stat">
          <div class="stat-value">98%</div>
          <div class="stat-label">守约率</div>
        </div>
        <div class="stat">
          <div class="stat-value">45</div>
          <div class="stat-label">总局数</div>
        </div>
        <div class="stat">
          <div class="stat-value">12</div>
          <div class="stat-label">连胜</div>
        </div>
      </section>

      <section class="quote">
        <strong>“守约是一种很稀缺的温柔。”</strong>
        <span>— DineRank 为每一次可靠赴约打分</span>
      </section>

      <section class="footer">
        <div class="qr-card">
          <div class="qr" aria-hidden="true"></div>
          <div>
            <h3>扫码下载</h3>
            <p>立即加入 DineRank，让约饭不再靠运气。</p>
          </div>
        </div>
        <div class="brand-card">
          <h3>DineRank</h3>
          <p>Reliable dinners, ranked friendships.</p>
          <div class="hash">#守约食神</div>
        </div>
      </section>
    </main>
  </body>
</html>
